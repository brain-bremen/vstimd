syntax = "proto3";
package wonderlamp.v1;

// ── Primitive types ───────────────────────────────────────────────────────────

message Vec2 {
  float x = 1;
  float y = 2;
}

message Color {
  float r = 1;
  float g = 2;
  float b = 3;
  float a = 4;
}

// ── Enumerations ──────────────────────────────────────────────────────────────

// Render backend the server is running on.
enum Backend {
  BACKEND_UNSPECIFIED = 0;
  BACKEND_DRM = 1; // VK_KHR_display, bare-metal Linux
  BACKEND_WINIT = 2; // X11 / Wayland / Win32 window
}

// Fill/stroke draw mode for shape stimuli (Rect, Ellipse).
enum DrawMode {
  DRAW_MODE_UNSPECIFIED = 0; // treated as FILLED (default)
  DRAW_MODE_FILLED = 1;
  DRAW_MODE_OUTLINED = 2;
  DRAW_MODE_FILLED_AND_OUTLINED = 3;
}

// Known stimulus types; used in query responses.
enum StimulusType {
  STIMULUS_TYPE_UNSPECIFIED = 0;
  STIMULUS_TYPE_RECT = 1;
  STIMULUS_TYPE_DISC = 2;
  STIMULUS_TYPE_ELLIPSE = 3;
  // 4–6 reserved for Wedge / Petal / Pixel when their renderers arrive
  STIMULUS_TYPE_BITMAP = 7;
  STIMULUS_TYPE_SHADER = 8;
  STIMULUS_TYPE_PARTICLE = 9;
}
