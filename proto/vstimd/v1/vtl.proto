syntax = "proto3";
package vstimd.v1;

// ── Direction ─────────────────────────────────────────────────────────────────
//
// Input lines represent signals arriving *into* vstimd.
//   Canonical writer: daqd (hardware DAQ) via the vtl shared-memory segment.
//   Software writer:  ZMQ SetVirtualTriggerLine (direction=INPUT) commands
//                     (simulate a hardware trigger).
//   Intended reader:  vstimd render loop — polled once per frame at the START
//                     of each frame to detect rising/falling edges that drive
//                     stimulus animations.
//
// Output lines represent signals driven *by* vstimd.
//   Canonical writer: vstimd render loop — written once per frame at the END
//                     of each frame (after present/vsync) to reflect what was
//                     shown on-screen.
//   Software writer:  ZMQ SetVirtualTriggerLine (direction=OUTPUT) commands
//                     (manual override / testing).
//   Intended reader:  daqd — woken by the output semaphore strobe (posted once
//                     per frame, not polled), then reads output_state to pulse
//                     hardware DAQ lines (frame-sync, stimulus-onset markers).
//                     Also read back by the animation engine as output *edges*
//                     so animations can start/cancel each other in the server.
//
// NOTE: frame-gated polling (VtlState::poll) and frame-gated output writing
// (VtlState::write_outputs) are wired into both the DRM and winit render loops.
// ZMQ SetVirtualTriggerLine commands provide an additional software-only path.

enum VirtualTriggerLineDirection {
  VIRTUAL_TRIGGER_LINE_DIRECTION_INPUT  = 0;
  VIRTUAL_TRIGGER_LINE_DIRECTION_OUTPUT = 1;
}

// ── Line addressing ───────────────────────────────────────────────────────────

message VirtualTriggerLineBankBit {
  uint32 bank = 1;
  uint32 bit  = 2;
}

// Address a virtual trigger line either by (bank, bit) index or by registered
// name, together with the line's direction.
//
// A VTL address is only unambiguous once its direction is known: input and
// output banks are independent signals that share the same (bank, bit) space.
// The direction is therefore part of every handle.
//
// The `direction` field is always significant: for a `bank_bit` handle it
// selects input vs. output; for a `name` handle it selects which registered
// entry to match (a name may be registered separately for input and output).
// Direction is never inferred — the caller states it explicitly.
message VirtualTriggerLineHandle {
  oneof handle {
    VirtualTriggerLineBankBit bank_bit = 1;
    string                    name     = 2;
  }
  VirtualTriggerLineDirection direction = 3;
}

// ── Naming ────────────────────────────────────────────────────────────────────

message SetVirtualTriggerLineNameRequest {
  uint32                      bank      = 1;
  uint32                      bit       = 2;
  VirtualTriggerLineDirection direction = 3;
  string                      name      = 4; // empty string clears the name
}

message ListVirtualTriggerLinesRequest {}

message VirtualTriggerLineInfo {
  string                      name      = 1;
  uint32                      bank      = 2;
  uint32                      bit       = 3;
  VirtualTriggerLineDirection direction = 4;
  bool                        high      = 5;
}

message ListVirtualTriggerLinesResponse {
  repeated VirtualTriggerLineInfo lines = 1;
}

// ── Line control ──────────────────────────────────────────────────────────────
// A single set of commands drives both directions; the handle's direction
// selects which bank is written.
//
// direction=INPUT writes input_state / input_rise_latch / input_fall_latch —
// simulating hardware trigger inputs arriving into vstimd.
//
// direction=OUTPUT writes output_state.  USE FOR DEBUGGING AND MANUAL OVERRIDE
// ONLY.  In normal operation output lines are driven exclusively by the vstimd
// render loop: animations accumulate changes in output_pending[] and the render
// loop commits them in a single write after all animations have advanced.
// Writing output lines via ZMQ bypasses this ordering guarantee and may conflict
// with animation-generated outputs in the same frame.  Use only when no
// animations are writing the same bits (e.g. manual bench testing, calibration).

message SetVirtualTriggerLineRequest {
  VirtualTriggerLineHandle handle = 1;
  bool                     value  = 2;
}

message ToggleVirtualTriggerLineRequest {
  VirtualTriggerLineHandle handle = 1;
}

// Drain accumulated rise/fall latches for an input line without changing its
// level.  Only valid for direction=INPUT (output lines have no latches).
message ClearVirtualTriggerLineLatchesRequest {
  VirtualTriggerLineHandle handle = 1;
}

// Set all 64 lines of a bank at once (bitmask). Direction selects input/output.
message SetVirtualTriggerLineBankRequest {
  VirtualTriggerLineDirection direction = 1;
  uint32                      bank      = 2;
  uint64                      value     = 3;
}

// ── Shared response ───────────────────────────────────────────────────────────

// Returned by Toggle (and optionally Set) to report the resulting state.
message VirtualTriggerLineStateResponse {
  bool high = 1;
}

// ── Edge polarity (used by animations) ───────────────────────────────────────

// Rising/falling edge of a VTL trigger line; referenced by animations.proto.
enum VtlEdge {
  VTL_EDGE_RISING  = 0;
  VTL_EDGE_FALLING = 1;
}
