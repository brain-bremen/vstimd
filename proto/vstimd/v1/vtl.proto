syntax = "proto3";
package vstimd.v1;

// ── Kind (line direction: input vs. output) ───────────────────────────────────
//
// Named `kind` rather than `direction` to avoid confusion with a VTL *edge*'s
// rising/falling direction (see VtlEdge below).
//
// Input lines represent signals arriving *into* vstimd.
//   Canonical writer: daqd (hardware DAQ) via the vtl shared-memory segment.
//   Software writer:  ZMQ SetVirtualTriggerLine (kind=INPUT) commands
//                     (simulate a hardware trigger).
//   Intended reader:  vstimd render loop — polled once per frame at the START
//                     of each frame to detect rising/falling edges that drive
//                     stimulus animations.
//
// Output lines represent signals driven *by* vstimd.
//   Canonical writer: vstimd render loop — written once per frame at the END
//                     of each frame (after present/vsync) to reflect what was
//                     shown on-screen.
//   Software writer:  ZMQ SetVirtualTriggerLine (kind=OUTPUT) commands
//                     (manual override / testing).
//   Intended reader:  daqd — woken by the output semaphore strobe (posted once
//                     per frame, not polled), then reads output_state to pulse
//                     hardware DAQ lines (frame-sync, stimulus-onset markers).
//                     Also read back by the animation engine as output *edges*
//                     so animations can start/cancel each other in the server.
//
// NOTE: frame-gated polling (VtlState::poll) and frame-gated output writing
// (VtlState::write_outputs) are wired into both the DRM and winit render loops.
// ZMQ SetVirtualTriggerLine commands provide an additional software-only path.

enum VirtualTriggerLineKind {
  // Unset — an explicit kind is required; the server rejects a handle left
  // UNSPECIFIED rather than guessing.
  VIRTUAL_TRIGGER_LINE_KIND_UNSPECIFIED = 0;
  VIRTUAL_TRIGGER_LINE_KIND_INPUT       = 1;
  VIRTUAL_TRIGGER_LINE_KIND_OUTPUT      = 2;
}

// ── Line addressing ───────────────────────────────────────────────────────────

message VirtualTriggerLineBankBit {
  uint32 bank = 1;
  uint32 bit  = 2;
}

// Address a virtual trigger line either by (bank, bit) index or by registered
// name, together with the line's kind (input vs. output).
//
// A VTL address is only unambiguous once its kind is known: input and output
// banks are independent signals that share the same (bank, bit) space. The kind
// is therefore part of every handle.
//
// The `kind` field is always significant: for a `bank_bit` handle it selects
// input vs. output; for a `name` handle it selects which registered entry to
// match (a name may be registered separately for input and output). Kind is
// never inferred — the caller states it explicitly.
message VirtualTriggerLineHandle {
  oneof handle {
    VirtualTriggerLineBankBit bank_bit = 1;
    string                    name     = 2;
  }
  VirtualTriggerLineKind kind = 3;
}

// ── Naming ────────────────────────────────────────────────────────────────────

message SetVirtualTriggerLineNameRequest {
  uint32                 bank = 1;
  uint32                 bit  = 2;
  VirtualTriggerLineKind kind = 3;
  string                 name = 4; // empty string clears the name
}

message ListVirtualTriggerLinesRequest {}

message VirtualTriggerLineInfo {
  string                 name = 1;
  uint32                 bank = 2;
  uint32                 bit  = 3;
  VirtualTriggerLineKind kind = 4;
  bool                   high = 5;
}

message ListVirtualTriggerLinesResponse {
  repeated VirtualTriggerLineInfo lines = 1;
}

// ── Line control ──────────────────────────────────────────────────────────────
// A single set of commands drives both kinds; the handle's kind selects which
// bank is written.
//
// kind=INPUT writes input_state / input_rise_latch / input_fall_latch —
// simulating hardware trigger inputs arriving into vstimd.
//
// kind=OUTPUT writes output_state.  USE FOR DEBUGGING AND MANUAL OVERRIDE ONLY.
// In normal operation output lines are driven exclusively by the vstimd render
// loop: animations accumulate changes in output_pending[] and the render loop
// commits them in a single write after all animations have advanced.  Writing
// output lines via ZMQ bypasses this ordering guarantee and may conflict with
// animation-generated outputs in the same frame.  Use only when no animations
// are writing the same bits (e.g. manual bench testing, calibration).

message SetVirtualTriggerLineRequest {
  VirtualTriggerLineHandle handle = 1;
  bool                     value  = 2;
}

message ToggleVirtualTriggerLineRequest {
  VirtualTriggerLineHandle handle = 1;
}

// Drain accumulated rise/fall latches for an input line without changing its
// level.  Only valid for kind=INPUT (output lines have no latches).
message ClearVirtualTriggerLineLatchesRequest {
  VirtualTriggerLineHandle handle = 1;
}

// Set all 64 lines of a bank at once (bitmask). Kind selects input/output.
message SetVirtualTriggerLineBankRequest {
  VirtualTriggerLineKind kind  = 1;
  uint32                 bank  = 2;
  uint64                 value = 3;
}

// ── Shared response ───────────────────────────────────────────────────────────

// Returned by Toggle (and optionally Set) to report the resulting state.
message VirtualTriggerLineStateResponse {
  bool high = 1;
}

// ── Edge polarity (used by animations) ───────────────────────────────────────

// Rising/falling edge of a VTL trigger line; referenced by animations.proto.
enum VtlEdge {
  VTL_EDGE_RISING  = 0;
  VTL_EDGE_FALLING = 1;
}
