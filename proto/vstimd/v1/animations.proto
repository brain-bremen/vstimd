syntax = "proto3";
package vstimd.v1;

import "vstimd/v1/vtl.proto";

// ── State enum ────────────────────────────────────────────────────────────────

// Lifecycle state of an animation.
enum AnimationState {
  ANIMATION_STATE_IDLE    = 0;  // created but not yet armed
  ANIMATION_STATE_ARMED   = 1;  // waiting for a trigger (or for Armed→Running)
  ANIMATION_STATE_RUNNING = 2;  // actively executing
  ANIMATION_STATE_DONE    = 3;  // completed; will not fire again until re-armed
}

// ── Animation body messages ───────────────────────────────────────────────────
// One message per animation variant; embedded in CreateAnimationRequest.body.
// stimuli are specified once in CreateAnimationRequest.stimuli, not here.

// Mirror stimulus enabled state to the level of a trigger line (input or output).
message CoupleVisibilityToTriggerLine {
  VirtualTriggerLineHandle trigger  = 1;
  bool                     polarity = 2; // true = enable when trigger is HIGH
}

// Set stimulus enabled once when a trigger edge fires.
message EnableOnTriggerEdge {
  VirtualTriggerLineHandle trigger = 1;
  VtlEdge                  edge    = 2;
  bool                     enabled = 3;
}

// Enable stimuli for duration_frames.
message FlashForNFrames {
  uint32 duration_frames = 1;
}

// Flicker stimuli on/off.
message FlickerForNFrames {
  uint32          on_frames     = 1;
  uint32          off_frames    = 2;
  optional uint32 total_frames  = 3; // absent = run forever
  bool            start_on_phase = 4; // true (default) = start in the on-phase
}

// Read stimulus position from a POSIX shared memory float array each frame.
message ExternalPosition2D {
  string shm_name = 1; // e.g. "/vstimd_pos_myobj"
  float  x_offset = 2;
  float  y_offset = 3;
}

// Move stimulus along a preloaded sequence of 2-D positions, one per frame.
// x and y must have the same length; the animation completes when all positions
// have been played. Each coordinate is in screen units (same as SetPosition).
message MoveAlongPath2D {
  repeated float x = 1;
  repeated float y = 2;
}

// Move stimulus along piecewise-linear waypoints at a constant speed.
// x and y must have the same length and at least 2 entries. Speed is in
// screen units per second; the server converts to frame steps using the
// measured display frame rate.
message MoveAlongSegments2D {
  repeated float x              = 1;
  repeated float y              = 2;
  float          speed_px_per_sec = 3;
}

// ── Animation management ──────────────────────────────────────────────────────

// start_action_mask bit values — applied when animation transitions Armed → Running:
//   0x02  ENABLE                    — enable stimuli at start
//   0x04  TOGGLE_PHOTODIODE         — toggle the photodiode indicator at start
//   0x08  START_ACTION_TRIGGER_LINE — pulse start_action_trigger_line for one frame at start
//
// final_action_mask bit values — applied when animation completes:
//   0x01  DISABLE           — disable stimuli on completion
//   0x04  TOGGLE_PHOTODIODE — toggle the photodiode indicator on completion
//   0x08  FINAL_ACTION_TRIGGER_LINE — pulse final_action_trigger_line for one frame on completion
//   0x10  RESTART                   — re-arm and restart the animation on completion
//   0x20  REVERSE                   — reserved
//   0x40  RESTORE_STATE             — restore user_enabled to its value at animation start
//   0x80  END_DEFERRED              — call end_deferred_mode on completion
message CreateAnimationRequest {
  string name              = 1;
  uint32 final_action_mask = 2;
  // Required when FINAL_ACTION_TRIGGER_LINE (0x08) is set; the output line to pulse.
  VirtualTriggerLineHandle final_action_trigger_line = 3;
  // Optional: if set, the animation waits for this edge before starting.
  VirtualTriggerLineHandle start_trigger = 4;
  VtlEdge                  start_edge    = 5;
  // Optional: if set, this input edge cancels the animation while it is Armed
  // or Running. Same wiring as start_trigger.
  VirtualTriggerLineHandle cancel_trigger = 9;
  VtlEdge                  cancel_edge    = 16;
  // Actions applied when the animation is cancelled (edge or software command),
  // independent of final_action. Bit values (mirror final_action_mask; RESTART /
  // REVERSE do not apply — cancel is always terminal):
  //   0x01  DISABLE                    — disable stimuli on cancel
  //   0x04  TOGGLE_PHOTODIODE          — toggle the photodiode indicator on cancel
  //   0x08  CANCEL_ACTION_TRIGGER_LINE — pulse cancel_action_trigger_line for one frame
  //   0x40  RESTORE_STATE              — restore user_enabled captured at start (Running only)
  //   0x80  END_DEFERRED               — end deferred mode on cancel
  // 0 (default) = hard abort: leave visibility as-is.
  uint32                   cancel_action_mask = 17;
  // Required when CANCEL_ACTION_TRIGGER_LINE (0x08) is set; the output line to pulse.
  VirtualTriggerLineHandle cancel_action_trigger_line = 19;
  // Stimuli affected by this animation (shared across all body types).
  repeated uint32          stimuli       = 6;
  // Actions applied when animation transitions Armed → Running (see bit values above).
  uint32                   start_action_mask = 7;
  // Required when START_ACTION_TRIGGER_LINE (0x08) is set; the output line to pulse.
  VirtualTriggerLineHandle start_action_trigger_line = 8;

  oneof body {
    CoupleVisibilityToTriggerLine couple_visibility_to_trigger_line = 10;
    EnableOnTriggerEdge enable_on_trigger_edge = 11;
    FlashForNFrames    flash_for_n_frames    = 12;
    FlickerForNFrames  flicker_for_n_frames  = 13;
    MoveAlongPath2D    move_along_path_2d    = 14;
    MoveAlongSegments2D move_along_segments_2d = 15;
    ExternalPosition2D external_position_2d  = 18;
  }
}

message ArmAnimationRequest    { uint32 handle = 1; }
message DisarmAnimationRequest { uint32 handle = 1; }
// Cancel an animation: applies its cancel_action_mask (DISABLE / RESTORE_STATE /
// trigger-line pulse / photodiode), releases any anim_enabled hold, and ends in
// DONE. Unlike disarm (which just returns to IDLE), cancel is terminal; an empty
// cancel_action_mask is a hard abort that leaves visibility as-is.
message CancelAnimationRequest { uint32 handle = 1; }
message DeleteAnimationRequest { uint32 handle = 1; }
message QueryAnimationRequest  { uint32 handle = 1; }
message ListAnimationsRequest  {}

message AnimationInfo {
  uint32         handle    = 1;
  string         name      = 2;
  AnimationState state     = 3;
  string         type_name = 4;
}

// Full animation configuration plus current state.
message QueryAnimationResponse {
  uint32                 handle = 1;
  AnimationState         state  = 2;
  CreateAnimationRequest params = 3;
  // Canonical animation-type tag — same string as AnimationInfo.type_name and the
  // serde config-file enum tag (the Rust variant name). Clients pass it through.
  string                 type_name = 4;
}

message ListAnimationsResponse {
  repeated AnimationInfo animations = 1;
}
