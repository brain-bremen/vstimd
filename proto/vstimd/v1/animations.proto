syntax = "proto3";
package vstimd.v1;

import "vstimd/v1/vtl.proto";

// ── State enum ────────────────────────────────────────────────────────────────

// Lifecycle state of an animation.
enum AnimationState {
  ANIMATION_STATE_IDLE    = 0;  // created but not yet armed
  ANIMATION_STATE_ARMED   = 1;  // waiting for a trigger (or for Armed→Running)
  ANIMATION_STATE_RUNNING = 2;  // actively executing
  ANIMATION_STATE_DONE    = 3;  // completed; will not fire again until re-armed
}

// ── Animation body messages ───────────────────────────────────────────────────
// One message per animation variant; embedded in CreateAnimationRequest.body.
// stimuli are specified once in CreateAnimationRequest.stimuli, not here.

// Mirror stimulus enabled state to the level of an input trigger line.
message CoupleVisibilityToInputTriggerLine {
  VirtualTriggerLineHandle trigger  = 1;
  bool                     polarity = 2; // true = enable when trigger is HIGH
}

// Set stimulus enabled once when a trigger edge fires.
message EnableOnTriggerEdge {
  VirtualTriggerLineHandle trigger = 1;
  VtlEdge                  edge    = 2;
  bool                     enabled = 3;
}

// Enable stimuli for duration_frames.
message FlashForNFrames {
  uint32 duration_frames = 1;
}

// Flicker stimuli on/off.
message FlickerForNFrames {
  uint32 on_frames    = 1;
  uint32 off_frames   = 2;
  uint32 total_frames = 3; // 0 = run forever
}

// Read stimulus position from a POSIX shared memory float array each frame.
message ExternalPosition2D {
  string shm_name = 1; // e.g. "/vstimd_pos_myobj"
  float  x_offset = 2;
  float  y_offset = 3;
}

// ── Animation management ──────────────────────────────────────────────────────

// final_action_mask bit values (combine with |):
//   0x01  DISABLE           — disable stimulus on completion
//   0x04  TOGGLE_PHOTODIODE — toggle the photodiode indicator on completion
//   0x08  FINAL_ACTION_TRIGGER_LINE — pulse final_action_trigger_line for one frame on completion
//   0x10  RESTART                   — re-arm and restart the animation on completion
//   0x20  REVERSE                   — reserved
//   0x80  END_DEFERRED              — call end_deferred_mode on completion
message CreateAnimationRequest {
  string name              = 1;
  uint32 final_action_mask = 2;
  // Required when FINAL_ACTION_TRIGGER_LINE (0x08) is set; the output line to pulse.
  VirtualTriggerLineHandle final_action_trigger_line = 3;
  // Optional: if set, the animation waits for this edge before starting.
  VirtualTriggerLineHandle start_trigger = 4;
  VtlEdge                  start_edge    = 5;
  // Stimuli affected by this animation (shared across all body types).
  repeated uint32          stimuli       = 6;

  oneof body {
    CoupleVisibilityToInputTriggerLine couple_visibility_to_input_trigger_line = 10;
    EnableOnTriggerEdge enable_on_trigger_edge = 11;
    FlashForNFrames    flash_for_n_frames   = 12;
    FlickerForNFrames  flicker_for_n_frames = 13;
    ExternalPosition2D external_position_2d = 18;
  }
}

message ArmAnimationRequest    { uint32 handle = 1; }
message DisarmAnimationRequest { uint32 handle = 1; }
message DeleteAnimationRequest { uint32 handle = 1; }
message QueryAnimationRequest  { uint32 handle = 1; }
message ListAnimationsRequest  {}

message AnimationInfo {
  uint32         handle    = 1;
  string         name      = 2;
  AnimationState state     = 3;
  string         type_name = 4;
}

// Full animation configuration plus current state.
message QueryAnimationResponse {
  uint32                 handle = 1;
  AnimationState         state  = 2;
  CreateAnimationRequest params = 3;
}

message ListAnimationsResponse {
  repeated AnimationInfo animations = 1;
}
