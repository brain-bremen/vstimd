syntax = "proto3";
package vstimd.v1;

import "vstimd/v1/color.proto";
import "vstimd/v1/stimuli/stimulus_type.proto";

// Render backend the server is running on.
enum RenderBackend {
  RENDER_BACKEND_UNSPECIFIED = 0;
  RENDER_BACKEND_DRM         = 1; // VK_KHR_display, bare-metal Linux
  RENDER_BACKEND_WINIT       = 2; // X11 / Wayland / Win32 window
}

// ── System mutations ──────────────────────────────────────────────────────────

// System command: set the background clear colour.
message SetBackgroundRequest {
  Color color = 1;
}

// System command: enter or exit deferred (frame-batched) mode.
// - active=true           → begin deferred mode (snapshot all live state)
// - active=false          → end deferred mode (schedule atomic flip on next vsync)
// - active=false, cancel=true → cancel deferred mode (discard pending changes)
message SetDeferredModeRequest {
  bool active = 1;
  bool cancel = 2;
}

// System command: remove all stimuli from the scene (except protected ones).
message DeleteAllRequest {}

// System command: enable or disable all stimuli (except protected ones).
message SetAllEnabledRequest {
  bool enabled = 1;
}

// ── Timing / synchronisation ──────────────────────────────────────────────────

// Block until the server has rendered at least `count` additional frames.
// The response carries the current frame_count and server_time_ns.
// Useful to confirm a deferred flip has been applied before querying state.
message WaitForFramesRequest {
  uint32 count = 1;
}

// Block until the server's monotonic clock reaches `server_time_ns` nanoseconds
// since server start (the same clock reported in Response.server_time_ns).
// Call GetServerTimeRequest first to read the current clock value.
message WaitUntilRequest {
  uint64 server_time_ns = 1;
}

// ── System queries ────────────────────────────────────────────────────────────

// System command: query server/display properties.
// Returns QueryServerInfoResponse in Response.body.
message QueryServerInfoRequest {}

// System command: list all stimuli in scene order.
// Returns ListStimuliResponse in Response.body.
message ListStimuliRequest {}

// ── System query response payloads ────────────────────────────────────────────

// Server version (semver).
message Version {
  uint32 major = 1;
  uint32 minor = 2;
  uint32 patch = 3;
}

// Response payload for QueryServerInfoRequest.
message QueryServerInfoResponse {
  uint32  width            = 1;   // display width in pixels
  uint32  height           = 2;   // display height in pixels
  float   frame_rate       = 3;   // measured frame rate in Hz
  Color   background_color = 4;
  RenderBackend backend    = 5;
  Version version          = 6;
}

// One row in a ListStimuliResponse.
message StimulusEntry {
  uint32       handle        = 1;
  StimulusType stimulus_type = 2;
  bool         enabled       = 3;
  string       id            = 4; // stable UUID assigned at creation
  string       name          = 5; // human-readable label (empty if not set)
}

// Response payload for ListStimuliRequest.
message ListStimuliResponse {
  repeated StimulusEntry entries = 1;
}

// ── Config persistence (system target) ───────────────────────────────────────

// List all configs available in the server's config directory.
message ListConfigsRequest {}

message ListConfigsResponse {
  repeated string names = 1; // bare names, no path or extension
}

// Load a named config from the server's config directory and apply it.
// additive=false: clear existing scene then restore (default).
// additive=true:  merge stimuli/animations; I/O config always fully replaced.
message LoadConfigRequest {
  string name     = 1;
  bool   additive = 2;
}

// Upload a config (as JSON) to the server's config directory.
// apply_now=true also applies the config immediately after saving.
// overwrite=false returns an error if the name already exists.
message UploadConfigRequest {
  string name      = 1;
  string json      = 2;
  bool   overwrite = 3;
  bool   apply_now = 4;
  bool   additive  = 5; // only used when apply_now=true
}

// Return the current scene + I/O config as a JSON string.
message RetrieveConfigRequest {}

message RetrieveConfigResponse {
  string json = 1;
}
