syntax = "proto3";
package vstimd.v1;

// Fill/stroke draw mode for shape stimuli.
enum ShapeDrawMode {
  SHAPE_DRAW_MODE_UNSPECIFIED         = 0; // treated as FILLED (default)
  SHAPE_DRAW_MODE_FILLED              = 1;
  SHAPE_DRAW_MODE_OUTLINED            = 2;
  SHAPE_DRAW_MODE_FILLED_AND_OUTLINED = 3;
}
