syntax = "proto3";
package vstimd.v1;

import "vstimd/v1/vec2.proto";
import "vstimd/v1/color.proto";

// ── Text enumerations ─────────────────────────────────────────────────────────

// Bidi / shaping mode for text stimuli.
enum LanguageStyle {
  LANGUAGE_STYLE_UNSPECIFIED = 0; // treated as LTR (default)
  LANGUAGE_STYLE_LTR         = 1; // left-to-right
  LANGUAGE_STYLE_RTL         = 2; // right-to-left (e.g. Hebrew)
  LANGUAGE_STYLE_ARABIC      = 3; // Arabic: RTL + contextual glyph reshaping
}

// ── Text creation ─────────────────────────────────────────────────────────────

// System command: create a text stimulus.
// Returns the new handle in Response.handle and the UUID in Response.id.
//
// Text is laid out inside the bounding box defined by `size`, with word-wrap.
// The box is positioned at `pos` (centre in pixel-space, Y-up).
// `anchor` controls which point of the box is placed at `pos`:
//   "center" (default), "top-left", "top-right", "bottom-left", "bottom-right"
message CreateTextRequest {
  string        text           = 1;  // UTF-8 content
  string        font           = 2;  // font family name (e.g. "Open Sans")
  float         letter_height  = 3;  // cap-height in pixels (0 → default 32)
  Vec2          size           = 4;  // bounding box [width, height] in pixels
  Vec2          pos            = 5;  // centre in pixel-space (Y-up)
  string        anchor         = 6;  // "center"|"top-left"|"top-right"|"bottom-left"|"bottom-right"
  Color         color          = 7;  // text colour (absent → white)
  Color         fill_color     = 8;  // background fill (absent → transparent)
  Color         border_color   = 9;  // box border (absent → no border)
  bool          flip_horiz     = 10; // mirror text horizontally
  LanguageStyle language_style = 11; // bidi / shaping mode (default LTR)
  string        id             = 12; // client-supplied UUID (empty → server generates one)
  string        name           = 13; // optional human-readable label
}

// ── Text-specific mutations ───────────────────────────────────────────────────

// Stimulus command: replace the text content of a Text stimulus.
// Returns WRONG_STIMULUS_TYPE if the handle is not a Text.
message SetTextRequest {
  string text = 1;
}

// Stimulus command: change the text colour of a Text stimulus.
// Returns WRONG_STIMULUS_TYPE if the handle is not a Text.
message SetTextColorRequest {
  Color color = 1;
}

// ── Text query params ─────────────────────────────────────────────────────────

message TextParams {
  string        text           = 1;
  string        font           = 2;
  float         letter_height  = 3;
  Vec2          size           = 4;
  string        anchor         = 5;
  Color         fill_color     = 6;
  Color         border_color   = 7;
  bool          flip_horiz     = 8;
  LanguageStyle language_style = 9;
}
