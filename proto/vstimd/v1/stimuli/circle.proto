syntax = "proto3";
package vstimd.v1;

import "vstimd/v1/vec2.proto";
import "vstimd/v1/color.proto";

// System command: create a circle stimulus.
// Returns the new handle in Response.handle and the UUID in Response.id.
message CreateCircleRequest {
  Vec2   center    = 1;   // pixel-space position
  float  radius    = 2;   // radius in pixels (0 → default 50)
  Color  fill_color = 3;  // fill colour (absent → scene default_fill)
  string id        = 4;   // client-supplied UUID (empty string → server generates one)
  string name      = 5;   // optional human-readable label
}

// Stimulus command: set the radius of a Circle stimulus.
// Returns WRONG_STIMULUS_TYPE if the handle is not a Circle.
message SetCircleRadiusRequest {
  float radius = 1;
}

message CircleParams { float radius = 1; }
