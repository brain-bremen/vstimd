syntax = "proto3";
package vstimd.v1;

import "vstimd/v1/color.proto";
import "vstimd/v1/vec2.proto";

// System command: create an ellipse stimulus.
// Returns the new handle in Response.handle and the UUID in Response.id.
message CreateEllipseRequest {
  Vec2 center = 1; // pixel-space position
  float width = 2; // full width in pixels  (0 → default 100)
  float height = 3; // full height in pixels (0 → default 100)
  Color fill_color = 4; // fill colour (absent → scene default_fill)
  float angle = 5; // orientation in degrees (CCW)
  string id = 6; // client-supplied UUID (empty string → server generates one)
  string name = 7; // optional human-readable label
}

// Stimulus command: resize an Ellipse stimulus.
// Returns WRONG_STIMULUS_TYPE if the handle is not an Ellipse.
message SetEllipseSizeRequest {
  float width = 1;
  float height = 2;
}

message EllipseParams {
  float width = 1;
  float height = 2;
}
