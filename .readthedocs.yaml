# Read the Docs configuration for the vstimd documentation.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# The docs build environment is defined by docs/pyproject.toml and driven with
# uv, so a full custom build is used instead of RTD's built-in mkdocs support.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    - pip install uv
    - uv run --project docs mkdocs build --strict --site-dir "$READTHEDOCS_OUTPUT/html"
