name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libinput-dev libudev-dev libdrm-dev libwayland-dev protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo build --release
      - run: cargo test
      - run: cargo clippy -- -D warnings
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: vstimd
          path: target/release/vstimd

  # vtl-miri disabled: Miri does not support shm_open, which the vtl
  # integration tests require. Re-enable once the tests have a Miri-compatible
  # backend (heap allocation under cfg(miri)).
  #
  # vtl-miri:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         submodules: false
  #     - uses: dtolnay/rust-toolchain@nightly
  #       with:
  #         components: miri
  #     - uses: actions/cache@v4
  #       with:
  #         path: |
  #           ~/.cargo/registry
  #           ~/.cargo/git
  #           target
  #         key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
  #         restore-keys: ${{ runner.os }}-miri-
  #     - run: cargo miri test -p vtl
  #       env:
  #         MIRIFLAGS: -Zmiri-strict-provenance

  python-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/python

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Xvfb
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends xvfb

      - uses: astral-sh/setup-uv@v5

      - run: xvfb-run -a make test

  python-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/python

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: astral-sh/setup-uv@v5

      - run: make typecheck

  python-null-e2e:
    runs-on: ubuntu-latest
    needs: [rust, python-unit]
    defaults:
      run:
        working-directory: client/python

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install runtime libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libinput10 libudev1 libdrm2 libwayland-client0

      - uses: actions/download-artifact@v4
        with:
          name: vstimd
          path: target/release/

      - run: chmod +x target/release/vstimd
        working-directory: ${{ github.workspace }}

      - uses: astral-sh/setup-uv@v5

      - run: make test-e2e-null

  # ── Web client (TypeScript) ────────────────────────────────────────────────
  # Typecheck + node WebSocket e2e against the prebuilt vstimd --null binary.
  web-client:
    runs-on: ubuntu-latest
    needs: [rust]
    defaults:
      run:
        working-directory: client/web

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install runtime libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libinput10 libudev1 libdrm2 libwayland-client0

      - uses: actions/download-artifact@v4
        with:
          name: vstimd
          path: target/release/

      - run: chmod +x target/release/vstimd
        working-directory: ${{ github.workspace }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/web/package-lock.json

      - run: npm ci
      - run: make typecheck
      - run: make test-e2e
        env:
          VSTIMD_BIN: ${{ github.workspace }}/target/release/vstimd

  # Real-browser smoke test of the React UI (Playwright + Chromium).
  web-browser-e2e:
    runs-on: ubuntu-latest
    needs: [rust]
    defaults:
      run:
        working-directory: client/web

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install runtime libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libinput10 libudev1 libdrm2 libwayland-client0

      - uses: actions/download-artifact@v4
        with:
          name: vstimd
          path: target/release/

      - run: chmod +x target/release/vstimd
        working-directory: ${{ github.workspace }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/web/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: make test-ui
        env:
          VSTIMD_BIN: ${{ github.workspace }}/target/release/vstimd

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: client/web/playwright-report/
