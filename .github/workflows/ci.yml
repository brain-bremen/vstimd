name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libinput-dev libudev-dev libdrm-dev libwayland-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo build --release
      - run: cargo test
      - run: cargo clippy -- -D warnings

      - uses: actions/upload-artifact@v4
        with:
          name: wonderlamp_server
          path: target/release/wonderlamp_server

  python-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-python

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Xvfb
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends xvfb

      - uses: astral-sh/setup-uv@v5

      - run: xvfb-run -a make test

  python-null-e2e:
    runs-on: ubuntu-latest
    needs: [rust, python-unit]
    defaults:
      run:
        working-directory: client-python

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install runtime libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libinput10 libudev1 libdrm2 libwayland-client0

      - uses: actions/download-artifact@v4
        with:
          name: wonderlamp_server
          path: target/release/

      - run: chmod +x target/release/wonderlamp_server
        working-directory: ${{ github.workspace }}

      - uses: astral-sh/setup-uv@v5

      - run: make test-e2e-null
